<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AI Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #070b13; --surface: #0d1420; --card: #111827;
            --border: #1e2d47; --border2: #243450;
            --accent: #3b82f6; --accent2: #06b6d4;
            --text: #e2e8f0; --muted: #64748b; --muted2: #94a3b8;
            --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
        }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font-body);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 70% 30%, rgba(6,182,212,0.07), transparent 60%),
                radial-gradient(ellipse 40% 40% at 30% 70%, rgba(59,130,246,0.05), transparent 50%);
            pointer-events: none;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(30,45,71,0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,71,0.25) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }
        .reg-box {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }
        .reg-top {
            padding: 40px 40px 28px; border-bottom: 1px solid var(--border);
            text-align: center;
            background: linear-gradient(180deg, rgba(6,182,212,0.04), transparent);
        }
        .brand {
            display: inline-flex; align-items: center; gap: 10px;
            font-family: var(--font-head); font-size: 20px; font-weight: 800;
            color: var(--text); text-decoration: none; margin-bottom: 24px;
        }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .reg-top h1 { font-family: var(--font-head); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .reg-top p { font-size: 14px; color: var(--muted2); }
        .reg-form { padding: 28px 40px 36px; }
        .reg-form p { margin-bottom: 16px; }
        .reg-form label { display: block; font-size: 13px; font-weight: 600; color: var(--muted2); margin-bottom: 7px; letter-spacing: 0.02em; }
        .reg-form input[type="text"],
        .reg-form input[type="password"],
        .reg-form input[type="email"] {
            width: 100%; padding: 12px 16px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: var(--font-body);
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .reg-form input:focus { border-color: var(--accent2); }
        .reg-form input::placeholder { color: var(--muted); }
        .reg-form .helptext { font-size: 11px; color: var(--muted); margin-top: 5px; display: block; }
        .reg-form ul.errorlist { list-style: none; margin-top: 6px; }
        .reg-form ul.errorlist li { font-size: 12px; color: #f87171; }
        .reg-form ul.errorlist li::before { content: '⚠ '; }
        .btn-register {
            width: 100%; padding: 14px; margin-top: 8px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #fff; font-family: var(--font-head); font-size: 15px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .btn-register:hover { box-shadow: 0 8px 32px rgba(6,182,212,0.35); transform: translateY(-1px); }
        .reg-footer {
            padding: 20px 40px; border-top: 1px solid var(--border);
            text-align: center; font-size: 14px; color: var(--muted2);
            background: var(--surface);
        }
        .reg-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .reg-footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .reg-top, .reg-form { padding-left: 24px; padding-right: 24px; } }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="reg-box">
    <div class="reg-top">
        <a href="/" class="brand">
            <div class="brand-icon">⚡</div>
            AI Analyzer
        </a>
        <h1>Create account</h1>
        <p>Start analyzing research papers for free</p>
    </div>

    <form method="post" class="reg-form">
        {% csrf_token %}
        {{ form.as_p }} <!--it takes the form from views and store form as p it means all the deatails such as name etc wrapped up in <p> tag-->
        <button type="submit" class="btn-register">Create Account →</button>
    </form>

    <div class="reg-footer">
        Already have an account? <a href="/login/">Sign in</a>
    </div>
</div>
</body>
</html>
