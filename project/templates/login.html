<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #070b13; --surface: #0d1420; --card: #111827;
            --border: #1e2d47; --border2: #243450;
            --accent: #3b82f6; --accent2: #06b6d4;
            --text: #e2e8f0; --muted: #64748b; --muted2: #94a3b8;
            --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
        }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font-body);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative; overflow: hidden;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 30% 30%, rgba(59,130,246,0.07), transparent 60%),
                radial-gradient(ellipse 40% 40% at 70% 70%, rgba(6,182,212,0.05), transparent 50%);
            pointer-events: none;
        }

        .grid-bg {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(30,45,71,0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,71,0.25) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        .login-box {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }

        .login-top {
            padding: 40px 40px 32px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            background: linear-gradient(180deg, rgba(59,130,246,0.05), transparent);
        }

        .brand {
            display: inline-flex; align-items: center; gap: 10px;
            font-family: var(--font-head); font-size: 20px; font-weight: 800;
            color: var(--text); text-decoration: none; margin-bottom: 28px;
        }

        .brand-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .login-top h1 { font-family: var(--font-head); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .login-top p { font-size: 14px; color: var(--muted2); }

        .login-form { padding: 32px 40px 40px; }

        /* Django form fields */
        .login-form p { margin-bottom: 20px; }

        .login-form label {
            display: block; font-size: 13px; font-weight: 600; color: var(--muted2);
            margin-bottom: 8px; letter-spacing: 0.02em;
        }

        .login-form input[type="text"],
        .login-form input[type="password"],
        .login-form input[type="email"] {
            width: 100%; padding: 12px 16px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: var(--font-body);
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }

        .login-form input:focus { border-color: var(--accent); }
        .login-form input::placeholder { color: var(--muted); }

        .login-form ul.errorlist {
            list-style: none; margin-top: 6px;
        }
        .login-form ul.errorlist li {
            font-size: 12px; color: #f87171; display: flex; align-items: center; gap: 4px;
        }
        .login-form ul.errorlist li::before { content: '⚠ '; }

        .btn-login {
            width: 100%; padding: 14px; margin-top: 8px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: #fff; font-family: var(--font-head); font-size: 15px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-login:hover { box-shadow: 0 8px 32px rgba(59,130,246,0.4); transform: translateY(-1px); }

        .login-footer {
            padding: 20px 40px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px; color: var(--muted2);
            background: var(--surface);
        }
        .login-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .login-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) { .login-top, .login-form { padding-left: 24px; padding-right: 24px; } }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-box">
    <div class="login-top">
        <a href="/" class="brand">
            <div class="brand-icon">⚡</div>
            AI Analyzer
        </a>
        <h1>Welcome back</h1>
        <p>Sign in to access your research dashboard</p>
    </div>

    <form method="post" class="login-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="login-footer">
        New to AI Analyzer? <a href="/register/">Create an account</a>
    </div>
</div>
</body>
</html>
